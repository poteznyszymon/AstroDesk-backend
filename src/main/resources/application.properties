spring.application.name=AstroDesk-Backend

spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=appuser
spring.datasource.password=apppassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=true

ldap.url=ldap://localhost:389
ldap.base=dc=astrodesk
ldap.dn=cn=admin,dc=astrodesk
ldap.pwd=adminpassword

# Network scanner (nmap)
network.scanner.nmap-path=nmap
network.scanner.ports=21,22,23,53,80,135,139,443,445,554,631,3389,5000,8009,8080,8443,9100,32400
network.scanner.scan-timeout-seconds=120
