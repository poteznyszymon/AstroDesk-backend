# ── application-prod.properties ─────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=appuser
spring.datasource.password=apppassword

spring.flyway.enabled=true

# Podsieć do skanowania
network.scanner.subnet=192.168.1.0/24

# Ścieżka do nmap.exe (jeśli nie jest w PATH podaj pełną ścieżkę)
# np. network.scanner.nmap-path=C:/Program Files (x86)/Nmap/nmap.exe
network.scanner.nmap-path=C:/Program Files (x86)/Nmap/nmap.exe

# Porty do skanowania
network.scanner.ports=22,80,443,3389,8080,445,139,21,25,53

# Auto-scan co 5 minut
network.scanner.interval-ms=300000
