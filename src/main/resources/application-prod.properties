# ── application-prod.properties ─────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=appuser
spring.datasource.password=apppassword

spring.flyway.enabled=true

# Ścieżka do nmap — opcjonalna, wykrywana automatycznie
# Odkomentuj jeśli nmap nie jest w PATH:
# network.scanner.nmap-path=/usr/local/bin/nmap

# Porty do skanowania
network.scanner.ports=22,80,443,3389,8080,445,139,21,25,53
