# ── application-dev.properties ──────────────────────────────────────────────
# Aktywuj przez: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# lub dodaj do application.properties: spring.profiles.active=dev

# Baza danych — te same co w docker-compose
spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=appuser
spring.datasource.password=apppassword

# Flyway — automatyczna migracja przy starcie
spring.flyway.enabled=true

# Mock scanner — jak często automatycznie "skanuje" (ms). 60000 = 1 minuta.
# Ustaw na 10000 (10s) jeśli chcesz szybciej widzieć zmiany podczas developmentu.
network.scanner.interval-ms=10000

# Logowanie zapytań SQL (opcjonalnie, przydatne do debugowania)
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true
